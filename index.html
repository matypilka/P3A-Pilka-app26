<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CarScent - Prémiové vůně do auta</title>
    <style>
        :root {
            --dark-blue: #0b1d33;
            --beige-bg: #faf8f5;
            --beige-card: #f2ede4;
            --text-dark: #1a2530;
            --text-light: #f2ede4;
            --accent-gold: #c4b5a3;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--beige-bg);
            color: var(--text-dark);
            line-height: 1.6;
            padding-bottom: 60px;
        }
        header {
            background-color: var(--dark-blue);
            color: var(--text-light);
            text-align: center;
            padding: 40px 20px;
            border-bottom: 4px solid var(--accent-gold);
        }
        /* Stylování loga v záhlaví */
        .logo-container img {
            max-width: 250px;
            height: auto;
            margin-bottom: 10px;
        }
        header p {
            font-size: 1.1rem;
            color: var(--accent-gold);
            font-style: italic;
            letter-spacing: 1px;
        }
        .container {
            max-width: 1000px;
            margin: 50px auto;
            padding: 0 20px;
        }
        .section-title {
            text-align: center;
            margin-bottom: 40px;
            font-size: 2rem;
            color: var(--dark-blue);
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
            margin-bottom: 60px;
        }
        .product-card {
            background-color: var(--beige-card);
            border: 1px solid #d9cebe;
            border-radius: 6px;
            padding: 25px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .product-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 5px 15px rgba(11, 29, 51, 0.1);
        }
        .product-card h3 {
            color: var(--dark-blue);
            font-size: 1.3rem;
            margin-bottom: 10px;
            border-bottom: 2px solid var(--accent-gold);
            padding-bottom: 5px;
        }
        .product-card p { font-size: 0.95rem; color: #4a5568; margin-bottom: 15px; }
        /* Stylování zobrazení ceny */
        .product-price {
            font-size: 1.2rem;
            font-weight: bold;
            color: var(--dark-blue);
            margin-top: auto;
            text-align: right;
        }
        .form-section {
            background-color: var(--dark-blue);
            color: var(--text-light);
            padding: 40px;
            border-radius: 8px;
            max-width: 600px;
            margin: 0 auto;
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
        }
        .form-section h2 {
            color: var(--text-light);
            margin-bottom: 25px;
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; font-size: 0.95rem; color: var(--accent-gold); }
        .form-group input, .form-group select, .form-group textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--accent-gold);
            border-radius: 4px;
            background-color: var(--beige-bg);
            color: var(--text-dark);
            font-size: 1rem;
        }
        button {
            display: block;
            width: 100%;
            padding: 14px;
            background-color: var(--accent-gold);
            color: var(--dark-blue);
            border: none;
            border-radius: 4px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 10px;
        }
        button:hover { background-color: #b5a490; }
        footer { text-align: center; margin-top: 60px; font-size: 0.9rem; color: #718096; }
    </style>
</head>
<body>

    <header>
        <div class="logo-container">
            <img src="logo.png" alt="CarScent Logo">
        </div>
        <p>Premium Auto Fragrances</p>
    </header>

    <div class="container">
        <h2 class="section-title">Naše Produkty</h2>
        
        <div class="products-grid" id="productsContainer"></div>

        <div class="form-section">
            <h2>Nezávazná Objednávka</h2>
            <form id="orderForm">
                <div class="form-group">
                    <label for="name">Jméno a příjmení</label>
                    <input type="text" id="name" value="Matyáš Pilka" required>
                </div>
                <div class="form-group">
                    <label for="email">E-mailová adresa</label>
                    <input type="email" id="email" value="matyas.pilka@gmail.com" required>
                </div>
                <div class="form-group">
                    <label for="phone">Telefonní číslo</label>
                    <input type="tel" id="phone" value="+420 704 523 410" required>
                </div>
                <div class="form-group">
                    <label for="product">Vyberte produkt</label>
                    <select id="product" required></select>
                </div>
                <div class="form-group">
                    <label for="note">Poznámka k objednávce</label>
                    <textarea id="note" rows="3" placeholder="Např. počet kusů..."></textarea>
                </div>
                <button type="submit">Odeslat objednávku</button>
            </form>
        </div>
    </div>

    <footer>
        <p>&copy; 2026 CarScent. Školní projekt do informatiky.</p>
    </footer>

    <script>
        // NAČTENÍ PRODUKTŮ VČETNĚ CENY Z CSV SOUBORU
        fetch('produkty.csv')
            .then(response => response.text())
            .then(data => {
                const riadky = data.split('\n');
                const container = document.getElementById('productsContainer');
                const select = document.getElementById('product');

                for (let i = 1; i < riadky.length; i++) {
                    if (riadky[i].trim() === '') continue;
                    
                    const bunky = riadky[i].split(';');
                    const nazev = bunky[1];
                    const popis = bunky[2];
                    const cena = bunky[3]; // Načtení ceny ze 4. sloupce

                    // Vytvoření karty produktu s cenou
                    const karta = document.createElement('div');
                    karta.className = 'product-card';
                    karta.innerHTML = `
                        <div>
                            <h3>${nazev}</h3>
                            <p>${popis}</p>
                        </div>
                        <div class="product-price">${cena}</div>
                    `;
                    container.appendChild(karta);

                    // Přidání produktu do výběru v objednávce (přidáme cenu i do závorky pro přehled)
                    const moznost = document.createElement('option');
                    moznost.value = `${nazev} (${cena})`;
                    moznost.textContent = `${nazev} (${cena})`;
                    select.appendChild(moznost);
                }
            })
            .catch(error => console.error('Chyba při načítání CSV:', error));

        // FUNKCE PRO ODESLÁNÍ FORMULÁŘE NA E-MAIL
        document.getElementById('orderForm').addEventListener('submit', function(event) {
            event.preventDefault();
            
            // === ZDE DOSAĎ SVŮJ ŠKOLNÍ E-MAIL ===
            const skolniEmail = "TVUJ.EMAIL@SKOLA.CZ"; 

            const jmeno = document.getElementById('name').value;
            const zakaznikEmail = document.getElementById('email').value;
            const telefon = document.getElementById('phone').value;
            const produkt = document.getElementById('product').value;
            const poznamka = document.getElementById('note').value || "Bez poznámky";

            const predmet = encodeURIComponent("Objednávka CarScent - " + produkt);
            const teloEmailu = encodeURIComponent(
                "Nová objednávka z webu:\n\n" +
                "Jméno: " + jmeno + "\n" +
                "E-mail: " + zakaznikEmail + "\n" +
                "Telefon: " + telefon + "\n" +
                "Produkt: " + produkt + "\n" +
                "Poznámka: " + poznamka
            );

            window.location.href = "mailto:" + skolniEmail + "?subject=" + predmet + "&body=" + teloEmailu;
        });
    </script>
</body>
</html>
